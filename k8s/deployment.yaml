apiVersion: apps/v1
kind: Deployment
metadata:
  name: gitops-app
spec:
  replicas: 2
  selector:
    matchLabels:
      app: gitops-app
  template:
    metadata:
      labels:
        app: gitops-app
    spec:
      containers:
        - name: gitops-app
          image: 952365419830.dkr.ecr.ap-south-1.amazonaws.com/gitops-demo:73c6db121d859d51d29ed25baa2049f68d205540
          ports:
            - containerPort: 8080

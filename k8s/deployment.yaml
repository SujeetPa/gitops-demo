apiVersion: apps/v1
kind: Deployment
metadata:
  name: gitops-app
spec:
  replicas: 2
  selector:
    matchLabels:
      app: gitops-app
  template:
    metadata:
      labels:
        app: gitops-app
    spec:
      containers:
        - name: gitops-app
          image: 952365419830.dkr.ecr.ap-south-1.amazonaws.com/gitops-demo:1a9121bb3bc449f7a594fe301c0953056c07f933
          ports:
            - containerPort: 8080

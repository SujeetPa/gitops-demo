apiVersion: apps/v1
kind: Deployment
metadata:
  name: gitops-app
spec:
  replicas: 2
  selector:
    matchLabels:
      app: gitops-app
  template:
    metadata:
      labels:
        app: gitops-app
    spec:
      containers:
        - name: gitops-app
          image: 952365419830.dkr.ecr.ap-south-1.amazonaws.com/gitops-demo:b4f5f260e1e5b5e8fef563c2c80275aa3439d9ee
          ports:
            - containerPort: 8080
